<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 溧阳狄氏家谱查询系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Microsoft YaHei','PingFang SC',sans-serif; 
            background: linear-gradient(135deg, #2c1810 0%, #5a2d14 50%, #8b0000 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            background: #fff; border-radius: 16px; padding: 40px; width: 380px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3); text-align: center;
        }
        .login-card h1 { font-size: 22px; color: #5a2d14; margin-bottom: 4px; }
        .login-card .sub { font-size: 13px; color: #999; margin-bottom: 24px; }
        .input-group { text-align: left; margin-bottom: 16px; }
        .input-group label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; }
        .input-group input {
            width: 100%; padding: 12px; border: 2px solid #e0d5cc; border-radius: 8px;
            font-size: 15px; outline: none; transition: border 0.3s;
        }
        .input-group input:focus { border-color: #8b0000; }
        .btn {
            width: 100%; padding: 12px; background: #8b0000; color: #fff; border: none;
            border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 8px;
            transition: background 0.3s;
        }
        .btn:hover { background: #a52a2a; }
        .error { color: #c62828; font-size: 13px; margin-top: 10px; display: none; }
        .toggle { font-size: 13px; color: #8b0000; margin-top: 16px; cursor: pointer; }
        .toggle:hover { text-decoration: underline; }
        .info { font-size: 12px; color: #aaa; margin-top: 20px; border-top: 1px solid #eee; padding-top: 16px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>📜 溧阳狄氏家谱</h1>
        <div class="sub" id="modeTitle">登录系统</div>
        
        <div id="nameGroup" class="input-group">
            <label>显示名称</label>
            <input type="text" id="displayName" placeholder="您的姓名">
        </div>
        <div class="input-group">
            <label>用户名</label>
            <input type="text" id="username" placeholder="请输入用户名" autocomplete="off">
        </div>
        <div class="input-group">
            <label>密码</label>
            <input type="password" id="password" placeholder="请输入密码">
        </div>
        
        <button class="btn" id="submitBtn" onclick="submitForm()">登 录</button>
        <div class="error" id="error"></div>
        <div class="toggle" id="toggleBtn" onclick="toggleMode()">没有账号？注册一个 →</div>
        <div class="info">默认管理员: admin / admin123<br>注册账号默认为访客，需管理员升级权限</div>
    </div>
    
    <script>
        let mode = 'login';
        const nameGroup = document.getElementById('nameGroup');
        
        function toggleMode() {
            mode = mode === 'login' ? 'register' : 'login';
            document.getElementById('submitBtn').textContent = mode === 'login' ? '登 录' : '注 册';
            document.getElementById('toggleBtn').textContent = mode === 'login' ? '没有账号？注册一个 →' : '已有账号？去登录 →';
            document.getElementById('modeTitle').textContent = mode === 'login' ? '登录系统' : '注册新账号';
            nameGroup.style.display = mode === 'register' ? 'block' : 'none';
            document.getElementById('error').style.display = 'none';
        }
        
        async function submitForm() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('error');
            errorEl.style.display = 'none';
            
            if (!username || !password) {
                errorEl.textContent = '请填写用户名和密码'; errorEl.style.display = 'block'; return;
            }
            
            if (mode === 'register') {
                const displayName = document.getElementById('displayName').value.trim();
                const resp = await fetch('/api/register', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password, display_name: displayName || username})
                });
                const data = await resp.json();
                if (data.ok) {
                    errorEl.style.color = '#2e7d32'; errorEl.textContent = data.msg; errorEl.style.display = 'block';
                    setTimeout(() => { mode = 'login'; toggleMode(); }, 1500);
                } else {
                    errorEl.textContent = data.error; errorEl.style.display = 'block';
                }
            } else {
                const resp = await fetch('/api/login', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                const data = await resp.json();
                if (data.ok) {
                    const next = new URLSearchParams(window.location.search).get('next') || '/';
                    window.location.href = next;
                } else {
                    errorEl.textContent = data.error; errorEl.style.display = 'block';
                }
            }
        }
        
        document.getElementById('password').addEventListener('keydown', e => {
            if (e.key === 'Enter') submitForm();
        });
    </script>
</body>
</html>
